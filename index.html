<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCS Idraulica di Caldare Silviu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --blue: #0ea5e9;
  --blue-dark: #0284c7;
  --blue-deep: #0c4a6e;
  --white: #ffffff;
  --gray-900: #0f172a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: var(--white); color: var(--gray-900); }
nav { position: fixed; top:0; left:0; right:0; z-index:100; padding:14px 24px; display:flex; justify-content:space-between; background: rgba(255,255,255,0.88); backdrop-filter: blur(14px); border-bottom:1px solid rgba(14,165,233,0.12); }
.nav-logo { font-family:'Outfit',sans-serif; font-weight:700; color: var(--blue-deep); }
.nav-logo span { display:block; font-weight:300; font-size:11px; color: var(--blue); }
.nav-cta { background:var(--blue); color:#fff; text-decoration:none; padding:9px 18px; border-radius:50px; font-weight:600; font-size:13px; }
.hero { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:100px 24px 60px; background: linear-gradient(150deg, var(--blue-deep) 0%, #164e63 45%, #0c4a6e 100%); position:relative; overflow:hidden; }
.hero-badge { margin-bottom:28px; color:#7dd3fc; padding:7px 16px; border-radius:50px; background: rgba(14,165,233,0.18); border:1px solid rgba(14,165,233,0.35); display:inline-flex; align-items:center; gap:8px; }
.hero-title { font-family:'Outfit',sans-serif; font-weight:900; font-size:clamp(42px, 11vw, 80px); color:#fff; margin-bottom:8px; }
.hero-title .accent-word { color: var(--blue); display:block; }
.hero-subtitle { font-family:'Outfit',sans-serif; font-weight:300; font-size:clamp(15px,3.5vw,22px); color:#7dd3fc; margin-bottom:48px; }
.hero-btn { background: var(--blue); color:#fff; text-decoration:none; padding:18px 36px; border-radius:50px; font-weight:700; display:inline-flex; align-items:center; gap:12px; }

section { padding:72px 24px; }
.section-label { font-family:'Outfit',sans-serif; font-size:11px; font-weight:700; color:var(--blue); text-transform:uppercase; display:inline-block; margin-bottom:10px; }
.section-title { font-family:'Outfit',sans-serif; font-weight:800; font-size:clamp(26px,6vw,40px); margin-bottom:36px; }

.gallery-container { position: relative; overflow: hidden; }
.gallery-wrapper { display:flex; overflow-x:auto; gap:16px; scroll-behavior: smooth; padding-bottom:12px; scrollbar-width:none; -ms-overflow-style:none; }
.gallery-wrapper::-webkit-scrollbar { display:none; }
.gallery-item { flex:0 0 350px; height:250px; border-radius:12px; overflow:hidden; cursor:pointer; transition: transform 0.2s; }
.gallery-item img { width:100%; height:100%; object-fit:cover; transition: transform 0.3s; }
.gallery-item:hover img { transform: scale(1.05); }

/* Frecce bianche grandi e trasparenti */
.arrow { position:absolute; top:50%; transform:translateY(-50%); background: rgba(255,255,255,0.3); color:#fff; font-size:50px; width:70px; height:70px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:20; user-select:none; font-weight:bold; }
.arrow-left { left:10px; }
.arrow-right { right:10px; }

.lightbox { display:none; position:fixed; inset:0; z-index:999; background: rgba(15,23,42,0.92); align-items:center; justify-content:center; padding:24px; cursor:zoom-out; }
.lightbox.active { display:flex; }
.lightbox img { max-width:90vw; max-height:88vh; object-fit:contain; border-radius:12px; }
.lightbox-close { position:absolute; top:16px; right:20px; color:#fff; font-size:28px; cursor:pointer; opacity:0.7; }
.lightbox-close:hover { opacity:1; }

</style>
</head>
<body>

<nav>
  <div class="nav-logo">SCS Idraulica<span>di Caldare Silviu</span></div>
  <a href="tel:3200892796" class="nav-cta">📞 Chiama Ora</a>
</nav>

<section class="hero">
  <div class="hero-badge"><span class="pulse"></span>Disponibile 24 ore su 24</div>
  <h1 class="hero-title">SCS<span class="accent-word">Idraulica</span></h1>
  <p class="hero-subtitle">Pronto Intervento Idraulico 24/7</p>
  <a href="tel:3200892796" class="hero-btn"><span>📞</span>Chiama Ora · 320 089 2796</a>
</section>

<section id="lavori">
  <span class="section-label">Portfolio</span>
  <h2 class="section-title">I Nostri Lavori</h2>
  <div class="gallery-container">
    <div class="arrow arrow-left" id="arrowLeft">‹</div>
    <div class="arrow arrow-right" id="arrowRight">›</div>
    <div class="gallery-wrapper" id="galleryWrapper"></div>
  </div>
</section>

<div class="lightbox" id="lightbox">
  <span class="lightbox-close" id="lightboxClose">✕</span>
  <img id="lightboxImg" src="" alt="Foto lavoro">
</div>

<script>
const total = 87;
const galleryWrapper = document.getElementById('galleryWrapper');

// Inserisco tutte le immagini
for(let i=1;i<=total;i++){
  const item = document.createElement('div');
  item.className='gallery-item';
  const img = document.createElement('img');
  img.src='foto'+i+'.jpeg';
  img.alt='Lavoro '+i;
  img.loading='lazy';
  item.appendChild(img);
  item.addEventListener('click',()=>openLightbox(img.src,img.alt));
  galleryWrapper.appendChild(item);
}

// Lightbox
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');
const lightboxClose = document.getElementById('lightboxClose');
function openLightbox(src,alt){
  lightboxImg.src=src;
  lightboxImg.alt=alt;
  lightbox.classList.add('active');
  document.body.style.overflow='hidden';
}
function closeLightbox(){
  lightbox.classList.remove('active');
  document.body.style.overflow='';
  lightboxImg.src='';
}
lightbox.addEventListener('click',e=>{if(e.target===lightbox)closeLightbox();});
lightboxClose.addEventListener('click',closeLightbox);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox();});

// Frecce scroll: scroll di 4 immagini per click
const scrollAmount = 4 * 366; // 350px + 16px gap
document.getElementById('arrowLeft').addEventListener('click',()=>{ galleryWrapper.scrollBy({left:-scrollAmount, behavior:'smooth'}); });
document.getElementById('arrowRight').addEventListener('click',()=>{ galleryWrapper.scrollBy({left:scrollAmount, behavior:'smooth'}); });

</script>

</body>
</html>
