
    <!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCS Idraulica di Caldare Silviu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --blue: #0ea5e9;
  --blue-dark: #0284c7;
  --blue-deep: #0c4a6e;
  --white: #ffffff;
  --gray-900: #0f172a;
  --radius: 16px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { font-family: 'DM Sans', sans-serif; color: var(--gray-900); background: var(--white); overflow-x: hidden; }
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(14,165,233,0.12);
}
.nav-logo { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 15px; color: var(--blue-deep); }
.nav-logo span { display: block; font-weight: 300; font-size: 11px; color: var(--blue); }
.nav-cta { display: inline-flex; align-items: center; gap: 7px; background: var(--blue); color: white; text-decoration: none; font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 13px; padding: 9px 18px; border-radius: 50px; transition: background 0.2s, transform 0.15s; }
.nav-cta:hover { background: var(--blue-dark); }
.hero { min-height: 100svh; background: linear-gradient(150deg, var(--blue-deep) 0%, #164e63 45%, #0c4a6e 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 100px 24px 60px; position: relative; overflow: hidden; }
.hero-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(14,165,233,0.18); border: 1px solid rgba(14,165,233,0.35); color: #7dd3fc; font-size: 12px; font-weight: 600; padding: 7px 16px; border-radius: 50px; margin-bottom: 28px; }
.hero-title { font-family: 'Outfit', sans-serif; font-weight: 900; font-size: clamp(42px, 11vw, 80px); color: white; margin-bottom: 8px; }
.hero-title .accent-word { color: var(--blue); display: block; }
.hero-subtitle { font-family: 'Outfit', sans-serif; font-weight: 300; font-size: clamp(15px, 3.5vw, 22px); color: #7dd3fc; margin-bottom: 48px; }
.hero-btn { display: inline-flex; align-items: center; gap: 12px; background: var(--blue); color: white; text-decoration: none; font-weight: 700; font-size: 18px; padding: 18px 36px; border-radius: 50px; }
section { padding: 72px 24px; }
.section-label { font-size: 11px; font-weight: 700; color: var(--blue); margin-bottom: 10px; display: block; }
.section-title { font-weight: 800; font-size: clamp(26px, 6vw, 40px); color: var(--gray-900); margin-bottom: 36px; }
.container { max-width: 1000px; margin: 0 auto; }
#lavori { background: white; }
.gallery-wrapper { position: relative; overflow-x: auto; scroll-behavior: smooth; display: flex; gap: 12px; }
.gallery-item { flex: 0 0 auto; width: 320px; border-radius: 12px; overflow: hidden; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: transform 0.35s ease; }
.gallery-item img { width: 100%; height: auto; display: block; }
.gallery-item:hover { transform: scale(1.05); }

/* Frecce scorrimento */
.scroll-arrow { position: absolute; top: 50%; transform: translateY(-50%); font-size: 50px; color: rgba(255,255,255,0.7); background: rgba(0,0,0,0.3); padding: 10px; border-radius: 50%; cursor: pointer; z-index: 10; user-select: none; transition: background 0.2s; }
.scroll-arrow:hover { background: rgba(0,0,0,0.5); }
.scroll-left { left: 5px; }
.scroll-right { right: 5px; }

.lightbox { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(15,23,42,0.92); align-items: center; justify-content: center; padding: 24px; cursor: zoom-out; backdrop-filter: blur(6px); }
.lightbox.active { display: flex; }
.lightbox img { max-width: 90vw; max-height: 88vh; object-fit: contain; border-radius: 12px; box-shadow: 0 24px 60px rgba(0,0,0,0.5); }
.lightbox-close { position: absolute; top: 16px; right: 20px; color: white; font-size: 28px; cursor: pointer; line-height: 1; opacity: 0.7; }
.lightbox-close:hover { opacity: 1; }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">SCS Idraulica<span>di Caldare Silviu</span></div>
  <a href="tel:3200892796" class="nav-cta">📞 Chiama Ora</a>
</nav>

<section class="hero">
  <div class="hero-badge">Disponibile 24 ore su 24</div>
  <h1 class="hero-title">SCS<span class="accent-word">Idraulica</span></h1>
  <p class="hero-subtitle">Pronto Intervento Idraulico 24/7</p>
  <a href="tel:3200892796" class="hero-btn">📞 Chiama Ora · 320 089 2796</a>
</section>

<section id="lavori">
  <div class="container">
    <span class="section-label">Portfolio</span>
    <h2 class="section-title">I Nostri Lavori</h2>
    <div class="gallery-wrapper" id="galleryWrapper">
      <div class="scroll-arrow scroll-left" id="scrollLeft">❮</div>
      <div class="scroll-arrow scroll-right" id="scrollRight">❯</div>
      <div class="gallery-grid" id="galleryGrid"></div>
    </div>
  </div>
</section>

<div class="lightbox" id="lightbox">
  <span class="lightbox-close" id="lightboxClose">✕</span>
  <img id="lightboxImg" src="" alt="Foto lavoro">
</div>

<script>
const total = 87; // numero di immagini
const basePath = ''; // immagini nella stessa cartella
const grid = document.getElementById('galleryGrid');

for (let i = 1; i <= total; i++) {
  const item = document.createElement('div');
  item.className = 'gallery-item';
  const img = document.createElement('img');
  img.src = basePath + 'foto' + i + '.jpeg'; // controlla nome file e estensione
  img.alt = 'Lavoro ' + i;
  img.loading = 'lazy';
  img.decoding = 'async';
  item.appendChild(img);
  item.addEventListener('click', () => openLightbox(img.src, img.alt));
  grid.appendChild(item);
}

const wrapper = document.getElementById('galleryWrapper');
const left = document.getElementById('scrollLeft');
const right = document.getElementById('scrollRight');

left.addEventListener('click', () => { wrapper.scrollBy({left: -1000, behavior: 'smooth'}); });
right.addEventListener('click', () => { wrapper.scrollBy({left: 1000, behavior: 'smooth'}); });

const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');
const lightboxClose = document.getElementById('lightboxClose');

function openLightbox(src,alt){
  lightboxImg.src = src;
  lightboxImg.alt = alt;
  lightbox.classList.add('active');
  document.body.style.overflow='hidden';
}

function closeLightbox(){
  lightbox.classList.remove('active');
  document.body.style.overflow='';
  lightboxImg.src='';
}

lightbox.addEventListener('click', e => {if(e.target===lightbox) closeLightbox();});
lightboxClose.addEventListener('click', closeLightbox);
document.addEventListener('keydown', e => {if(e.key==='Escape') closeLightbox();});
</script>

</body>
</html>
