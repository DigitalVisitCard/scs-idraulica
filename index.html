<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCS Idraulica di Caldare Silviu</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Inter&display=swap" rel="stylesheet">

<style>
/* --- TUO CSS (uguale) --- */
:root {
  --navy:#0a2540;
  --blue:#1a5fa8;
  --teal:#0f6e56;
  --teal-mid:#1d9e75;
  --slate-light:#f8fafc;
  --border:rgba(10,37,64,0.1);
  --white:#fff;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;color:var(--navy);}

.gallery-item{
  flex:0 0 calc(50% - 4px);
  aspect-ratio:4/3;
  overflow:hidden;
  background:#d1dde8;
  border-radius:8px;
}

.gallery-item img,
.gallery-item video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.gallery-row{
  display:flex;
  gap:8px;
  transition:0.4s;
}

.gallery-scroll{overflow:hidden;}
.gallery-outer{position:relative;}

.arrow-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:40px;
  height:40px;
  background:#0a2540;
  color:white;
  border:none;
  cursor:pointer;
  z-index:10;
}

.arrow-left{left:-10px;}
.arrow-right{right:-10px;}
</style>
</head>

<body>

<!-- FOTO -->
<section>
<h2>Foto lavori</h2>

<div class="gallery-outer">
<button class="arrow-btn arrow-left" id="arrowLeft">←</button>

<div class="gallery-scroll">
<div class="gallery-row" id="rowTop"></div>
</div>

<button class="arrow-btn arrow-right" id="arrowRight">→</button>
</div>
</section>

<!-- VIDEO -->
<section>
<h2>Video lavori</h2>

<div class="gallery-outer">
<button class="arrow-btn arrow-left" id="videoLeft">←</button>

<div class="gallery-scroll">
<div class="gallery-row" id="videoRow"></div>
</div>

<button class="arrow-btn arrow-right" id="videoRight">→</button>
</div>
</section>

<script>
/* --- FOTO --- */
const total = 8;
const rowTop = document.getElementById('rowTop');

function makeImg(i){
  const div=document.createElement('div');
  div.className='gallery-item';
  const img=document.createElement('img');
  img.src='foto'+i+'.jpeg';
  div.appendChild(img);
  return div;
}

for(let i=1;i<=total;i++){
  rowTop.appendChild(makeImg(i));
}

/* SLIDE FOTO */
let offset=0;

function getWidth(){
  const el=rowTop.querySelector('.gallery-item');
  return el ? el.offsetWidth+8 : 0;
}

function slide(dir){
  const w=getWidth();
  offset=Math.max(0,offset+dir*w);
  rowTop.style.transform='translateX(-'+offset+'px)';
}

arrowLeft.onclick=()=>slide(-1);
arrowRight.onclick=()=>slide(1);


/* --- VIDEO --- */
const videoRow=document.getElementById('videoRow');

const videos=[
  'video1.mp4',
  'video2.mp4',
  'video3.mp4',
  'video4.mp4'
];

function makeVideo(src){
  const div=document.createElement('div');
  div.className='gallery-item';

  const video=document.createElement('video');
  video.src=src;
  video.controls=true;
  video.preload='metadata';

  div.appendChild(video);
  return div;
}

videos.forEach(v=>{
  videoRow.appendChild(makeVideo(v));
});


/* SLIDE VIDEO */
let videoOffset=0;

function slideVideo(dir){
  const el=videoRow.querySelector('.gallery-item');
  if(!el)return;

  const w=el.offsetWidth+8;
  videoOffset=Math.max(0,videoOffset+dir*w);

  videoRow.style.transform='translateX(-'+videoOffset+'px)';
}

videoLeft.onclick=()=>slideVideo(-1);
videoRight.onclick=()=>slideVideo(1);
</script>

</body>
</html>
