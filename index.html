<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCS Idraulica di Caldare Silviu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --blue: #0ea5e9;
  --blue-dark: #0284c7;
  --blue-deep: #0c4a6e;
  --blue-light: #e0f2fe;
  --accent: #06b6d4;
  --white: #ffffff;
  --gray-50: #f8fafc;
  --gray-100: #f1f5f9;
  --gray-500: #64748b;
  --gray-900: #0f172a;
  --radius: 16px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', sans-serif;
  color: var(--gray-900);
  background: var(--white);
  overflow-x: hidden;
}
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(14,165,233,0.12);
}
.nav-logo {
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 15px;
  color: var(--blue-deep);
  letter-spacing: -0.3px;
  line-height: 1.2;
}
.nav-logo span {
  display: block;
  font-weight: 300;
  font-size: 11px;
  color: var(--blue);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: var(--blue);
  color: white;
  text-decoration: none;
  font-family: 'Outfit', sans-serif;
  font-weight: 600;
  font-size: 13px;
  padding: 9px 18px;
  border-radius: 50px;
  transition: background 0.2s, transform 0.15s;
}
.nav-cta:active { transform: scale(0.97); }
.nav-cta:hover { background: var(--blue-dark); }
.hero {
  min-height: 100svh;
  background: linear-gradient(150deg, var(--blue-deep) 0%, #164e63 45%, #0c4a6e 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 100px 24px 60px;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, rgba(14,165,233,0.25) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 100% 80%, rgba(6,182,212,0.15) 0%, transparent 60%);
}
.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(14,165,233,0.18);
  border: 1px solid rgba(14,165,233,0.35);
  color: #7dd3fc;
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 7px 16px;
  border-radius: 50px;
  margin-bottom: 28px;
  position: relative;
  animation: fadeUp 0.6s ease both;
}
.pulse {
  width: 8px; height: 8px;
  background: #4ade80;
  border-radius: 50%;
  animation: pulse 1.8s ease infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.4); }
}
.hero-title {
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: clamp(42px, 11vw, 80px);
  color: white;
  letter-spacing: -2px;
  line-height: 1.0;
  margin-bottom: 8px;
  position: relative;
  animation: fadeUp 0.7s 0.1s ease both;
}
.hero-title .accent-word { color: var(--blue); display: block; }
.hero-subtitle {
  font-family: 'Outfit', sans-serif;
  font-weight: 300;
  font-size: clamp(15px, 3.5vw, 22px);
  color: #7dd3fc;
  letter-spacing: 0.5px;
  margin-bottom: 48px;
  position: relative;
  animation: fadeUp 0.7s 0.2s ease both;
}
.hero-btn {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  background: var(--blue);
  color: white;
  text-decoration: none;
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 18px;
  padding: 18px 36px;
  border-radius: 50px;
  box-shadow: 0 8px 32px rgba(14,165,233,0.4);
  transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
  position: relative;
  animation: fadeUp 0.7s 0.3s ease both;
}
.hero-btn:hover { background: var(--blue-dark); transform: translateY(-2px); box-shadow: 0 14px 40px rgba(14,165,233,0.5); }
.hero-btn:active { transform: scale(0.97); }
.hero-btn .btn-icon { width: 36px; height: 36px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.hero-scroll { margin-top: 52px; color: rgba(125,211,252,0.5); font-size: 22px; animation: bounce 2s ease infinite, fadeUp 0.7s 0.5s ease both; position: relative; }
@keyframes bounce { 0%,100%{transform:translateY(0);}50%{transform:translateY(7px);} }
@keyframes fadeUp { from {opacity:0; transform:translateY(22px);} to {opacity:1; transform:translateY(0);} }
section { padding: 72px 24px; }
.section-label { display: inline-block; font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--blue); margin-bottom: 10px; }
.section-title { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: clamp(26px, 6vw, 40px); color: var(--gray-900); letter-spacing: -1px; line-height: 1.15; margin-bottom: 36px; }
.container { max-width: 680px; margin: 0 auto; }
#lavori { background: white; }
.gallery-grid { columns: 2; column-gap: 12px; max-width: 680px; margin: 0 auto; }
.gallery-item { break-inside: avoid; margin-bottom: 12px; border-radius: 12px; overflow: hidden; position: relative; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.gallery-item img { width: 100%; height: auto; display: block; transition: transform 0.35s ease; }
.gallery-item:hover img { transform: scale(1.05); }
.lightbox { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(15,23,42,0.92); align-items: center; justify-content: center; padding: 24px; cursor: zoom-out; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
.lightbox.active { display: flex; }
.lightbox img { max-width: 90vw; max-height: 88vh; object-fit: contain; border-radius: 12px; box-shadow: 0 24px 60px rgba(0,0,0,0.5); }
.lightbox-close { position: absolute; top: 16px; right: 20px; color: white; font-size: 28px; cursor: pointer; line-height: 1; opacity: 0.7; transition: opacity 0.2s; font-family: 'Outfit', sans-serif; }
.lightbox-close:hover { opacity: 1; }
@media (max-width: 480px) { .gallery-grid { columns: 2; column-gap: 8px; } .gallery-item { margin-bottom: 8px; border-radius: 8px; } }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">SCS Idraulica<span>di Caldare Silviu</span></div>
  <a href="tel:3200892796" class="nav-cta">📞 Chiama Ora</a>
</nav>

<section class="hero">
  <div class="hero-badge"><span class="pulse"></span>Disponibile 24 ore su 24</div>
  <h1 class="hero-title">SCS<span class="accent-word">Idraulica</span></h1>
  <p class="hero-subtitle">Pronto Intervento Idraulico 24/7</p>
  <a href="tel:3200892796" class="hero-btn"><span class="btn-icon">📞</span>Chiama Ora · 320 089 2796</a>
  <div class="hero-scroll">↓</div>
</section>

<section id="lavori">
  <div class="container">
    <span class="section-label">Portfolio</span>
    <h2 class="section-title">I Nostri Lavori</h2>
    <div class="gallery-grid" id="galleryGrid"></div>
  </div>
</section>

<div class="lightbox" id="lightbox">
  <span class="lightbox-close" id="lightboxClose">✕</span>
  <img id="lightboxImg" src="" alt="Foto lavoro">
</div>

<script>
const total = 87; // numero di immagini
const basePath = ''; // perché le immagini sono nella root
const grid = document.getElementById('galleryGrid');

for (let i = 1; i <= total; i++) {
  const item = document.createElement('div');
  item.className = 'gallery-item';
  const img = document.createElement('img');
  img.src = basePath + 'foto' + i + '.jpeg'; // usa 'foto' + numero + estensione
  img.alt = 'Lavoro ' + i;
  img.loading = 'lazy';
  img.decoding = 'async';
  item.appendChild(img);
  item.addEventListener('click', () => openLightbox(img.src, img.alt));
  grid.appendChild(item);
}
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');
const lightboxClose = document.getElementById('lightboxClose');

function openLightbox(src,alt){
  lightboxImg.src = src;
  lightboxImg.alt = alt;
  lightbox.classList.add('active');
  document.body.style.overflow='hidden';
}

function closeLightbox(){
  lightbox.classList.remove('active');
  document.body.style.overflow='';
  lightboxImg.src='';
}

lightbox.addEventListener('click',e=>{if(e.target===lightbox)closeLightbox();});
lightboxClose.addEventListener('click',closeLightbox);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox();});
</script>

</body>
</html>
